name: Build Installer

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller build_spec.spec
      - name: Get version from version.py
        id: get_version
        run: |
          $version = (Get-Content version.py | Select-String -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: .\build_installer.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: museum_setup-*.exe
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: museum_setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}